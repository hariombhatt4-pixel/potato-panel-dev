<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Potato Host</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <div class="logo">🥔 Potato Host</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="login.html">Login</a>
            <a href="register.html" class="btn-register">Get Started</a>
        </div>
    </nav>

    <section class="auth-section" style="max-width: 400px; margin: 50px auto; padding: 20px;">
        <h2>User Login 🥔</h2>
        <form id="login-form">
            <div style="margin-bottom: 15px;">
                <label>Email Address:</label><br>
                <input type="email" id="login-email" placeholder="enter your email" required style="width: 100%; padding: 8px; margin-top: 5px;">
            </div>
            <div style="margin-bottom: 15px;">
                <label>Password:</label><br>
                <input type="password" id="login-password" placeholder="enter password" required style="width: 100%; padding: 8px; margin-top: 5px;">
            </div>
            <button type="submit" style="width: 100%; padding: 10px;">Login</button>
        </form>
        <p id="login-message" style="margin-top: 15px; font-weight: bold;"></p>
    </section>

    <script>
        // Check if session already exists
        if (localStorage.getItem('potato_session')) {
            window.location.href = "dashboard.html";
        }

        // 🎯 THE REAL PROJECT INSTANCE LOCK
        const SUPABASE_URL = "https://vbegvwzfntcjqngagoya.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZiZWd2d3pmbnRjanFuZ2Fnb3lhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MjA3NTksImV4cCI6MjA5Njk5Njc1OX0.a5JrlBLKkfvJr4KQBfn8xTJ4lSaLtrbnKXF9lmlQInQ";

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const messageEl = document.getElementById('login-message');

            messageEl.style.color = "orange";
            messageEl.innerText = "Checking credentials...";

            try {
                // Direct bridge request using browser standard fetch
                const response = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json', 
                        'apikey': SUPABASE_ANON_KEY 
                    },
                    body: JSON.stringify({ email: email, password: password })
                });

                const data = await response.json();

                if (!response.ok) {
                    messageEl.style.color = "red";
                    messageEl.innerText = "Error: " + (data.error_description || data.msg || data.message || "Invalid credentials");
                } else if (data && data.access_token) {
                    messageEl.style.color = "green";
                    messageEl.innerText = "Success! Redirecting...";
                    
                    const structuredSession = {
                        access_token: data.access_token,
                        user: data.user
                    };

                    localStorage.setItem('potato_session', JSON.stringify(structuredSession));
                    window.location.replace("dashboard.html");
                } else {
                    messageEl.style.color = "red";
                    messageEl.innerText = "Server error: No validation token issued.";
                }
            } catch (err) {
                messageEl.style.color = "red";
                messageEl.innerText = "Network Error: Cannot connect to database.";
                console.error(err);
            }
        });
    </script>
</body>
</html>
