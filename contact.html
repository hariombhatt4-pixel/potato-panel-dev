<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Potato Host</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">🥔 Potato Host</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="faq.html">FAQ</a>
            <a href="status.html">Status</a>
            <a href="contact.html">Contact</a>
            <a href="login.html">Login</a>
            <a href="register.html" class="btn-register">Get Started</a>
        </div>
    </nav>

    <main style="max-width: 500px; margin: 50px auto; padding: 30px;">
        <h2>Get In Touch ✉️</h2>
        <form action="#" method="POST" style="display: flex; flex-direction: column; gap: 15px;">
            <div>
                <label>Your Name:</label>
                <input type="text" placeholder="Enter your name" required>
            </div>
            <div>
                <label>Your Email:</label>
                <input type="email" placeholder="name@example.com" required>
            </div>
            <div>
                <label>Message / Support Query:</label>
                <textarea style="width: 100%; height: 120px; background: #0f0f0f; border: 1px solid #333; color: white; border-radius: 6px; padding: 10px; margin-top: 8px; font-family: inherit; resize: none;" placeholder="How can our potato infrastructure help you today?" required></textarea>
            </div>
            <button type="submit">Send Message 🚀</button>
        </form>
    </main>

    <footer>
        <p>🥔 Potato Host — Free Hosting For Everyone!</p>
        <div class="footer-links">
            <a href="terms.html">Terms of Service</a>
            <a href="privacy.html">Privacy Policy</a>
            <a href="contact.html">Contact</a>
        </div>
        <p class="footer-bottom">Made with ❤️ in India</p>
    </footer>
</body>
