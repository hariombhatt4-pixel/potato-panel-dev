<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Potato Host</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav>
        <div class="logo">🥔 Potato Host</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="faq.html">FAQ</a>
            <a href="status.html">Status</a>
            <a href="contact.html">Contact</a>
            <a href="login.html">Login</a>
            <a href="register.html" class="btn-register">Get Started</a>
        </div>
    </nav>

    <!-- REGISTRATION BOX -->
    <section class="auth-section" style="max-width: 400px; margin: 50px auto; padding: 20px;">
        <h2>Create Free Account 🚀</h2>
        <form id="register-form">
            <div style="margin-bottom: 15px;">
                <label for="reg-email">Email Address:</label><br>
                <input type="email" id="reg-email" placeholder="enter your email" required style="width: 100%; padding: 8px; margin-top: 5px;">
            </div>
            <div style="margin-bottom: 15px;">
                <label for="reg-password">Password:</label><br>
                <input type="password" id="reg-password" placeholder="create password" required style="width: 100%; padding: 8px; margin-top: 5px;">
            </div>
            <button type="submit" style="width: 100%; padding: 10px;">Sign Up</button>
        </form>
        <p id="reg-message" style="margin-top: 15px; font-weight: bold;"></p>
    </section>

    <!-- FOOTER -->
    <footer>
        <p>🥔 Potato Host — Free Hosting For Everyone!</p>
        <div class="footer-links">
            <a href="terms.html">Terms of Service</a>
            <a href="privacy.html">Privacy Policy</a>
            <a href="contact.html">Contact</a>
        </div>
        <p class="footer-bottom">Made with ❤️ in India</p>
    </footer>

    <!-- INTERACTION LOGIC SCRIPT -->
    <script>
        // 🛡️ LIVE SERVER SECURITY GUARD
        if (localStorage.getItem('potato_session')) {
            window.location.replace("dashboard.html");
        }

        // 🎯 REAL HARDCODED ENDPOINT
        const SUPABASE_URL = "https://vbegvwzfntcjqngagoya.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZiZWd2d3pmbnRjanFuZ2Fnb3lhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MjA3NTksImV4cCI6MjA5Njk5Njc1OX0.a5JrlBLKkfvJr4KQBfn8xTJ4lSaLtrbnKXF9lmlQInQ";

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            const messageEl = document.getElementById('reg-message');

            messageEl.style.color = "orange";
            messageEl.innerText = "Creating account...";

            try {
                const response = await fetch(`${SUPABASE_URL}/auth/v1/signup`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json', 
                        'apikey': SUPABASE_ANON_KEY 
                    },
                    body: JSON.stringify({ email: email, password: password })
                });

                const data = await response.json();

                if (!response.ok) {
                    messageEl.style.color = "red";
                    messageEl.innerText = "Error: " + (data.msg || data.message || "Registration failed.");
                } else {
                    messageEl.style.color = "green";
                    messageEl.innerText = "Registration successful! You can now click Login to enter your dashboard.";
                }
            } catch (err) {
                messageEl.style.color = "red";
                messageEl.innerText = "Network Error: Cannot connect to database.";
                console.error(err);
            }
        });
    </script>
</body>
</html>
